name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-quality:
    name: Go quality and cross-platform build
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.12'
          check-latest: true

      - name: Install analysis tools
        run: make install-tools

      - name: Run CI checks
        run: make ci-go

  website-quality:
    name: Website quality and production build
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Run website CI checks
        run: make ci-web
