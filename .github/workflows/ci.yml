name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Go quality and cross-platform build
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
          check-latest: true

      - name: Install analysis tools
        run: make install-tools

      - name: Run CI checks
        run: make ci
