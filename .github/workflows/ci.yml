name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-quality:
    name: Go quality and cross-platform build
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.25.12'
          check-latest: true
          cache-dependency-path: |
            platform/client/go.sum
            platform/services/gateway/go.sum
            platform/shared/go.sum

      - name: Cache analysis tools
        uses: actions/cache@v6
        with:
          path: ~/go/bin
          key: tools-${{ runner.os }}-${{ hashFiles('Makefile') }}

      - name: Install analysis tools
        run: make install-tools

      - name: Cache vuln DB
        uses: actions/cache@v6
        with:
          path: ~/.cache/govulncheck
          key: vulndb-${{ runner.os }}-${{ hashFiles('Makefile') }}

      - name: Run CI checks
        run: make ci-go

  website-quality:
    name: Website quality and production build
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Run website CI checks
        run: make ci-web
